name: Sync to Hugging Face Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: git lfs install

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "Workflow Bot"
          
          # Clone the HF Space into a temporary folder
          git clone https://nadagz:$HF_TOKEN@huggingface.co/spaces/nadagz/luqya hf_space
          
          # Copy everything from backend to hf_space
          # We use rsync to cleanly mirror the folder
          rsync -av --delete --exclude='.git' backend/ hf_space/
          
          cd hf_space
          git add .
          
          # Only commit and push if there are changes
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Sync from GitHub: ${GITHUB_SHA}"
            git push origin main
          else
            echo "No changes to sync"
          fi
